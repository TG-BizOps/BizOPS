name: Build Portal Index

on:
  push:
    branches: [main]
    paths:
      - 'docs.json'
      - 'scripts/build_index.py'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 scripts/build_index.py
      - name: Commit if changed
        run: |
          git config user.name "BizOps Build Bot"
          git config user.email "bizops-build@toomics.com"
          git add index.html
          if ! git diff --cached --quiet; then
            git commit -m "build: regenerate index.html from docs.json"
            git push
          fi
